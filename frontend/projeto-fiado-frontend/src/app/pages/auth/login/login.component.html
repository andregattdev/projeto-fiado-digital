<div class="auth-page">
  <div class="auth-card">
    <div class="auth-header">
      <mat-icon class="auth-logo">store</mat-icon>
      <h1>Vendo_FiadoApp Digital</h1>
      <p>Acesso exclusivo do comércio</p>
    </div>

    <form [formGroup]="form" (ngSubmit)="entrar()">
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>E-mail</mat-label>
        <input matInput type="email" formControlName="email" autocomplete="username" />
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Senha</mat-label>
        <input matInput type="password" formControlName="senha" autocomplete="current-password" />
      </mat-form-field>

      <p class="erro" *ngIf="erro">{{ erro }}</p>

      <button mat-flat-button class="full-width btn-submit btn-primary-purple" type="submit" [disabled]="loading || form.invalid">
        <mat-spinner *ngIf="loading" diameter="22"></mat-spinner>
        <span *ngIf="!loading">Entrar</span>
      </button>
    </form>

    <div class="auth-divider">
      <span>ou</span>
    </div>

    <div class="google-btn-container">
      <div id="googleBtn"></div>
    </div>

    <p class="auth-footer">
      Ainda não tem conta?
      <a routerLink="/cadastro">Cadastrar novo comércio</a>
    </p>
  </div>
</div>
