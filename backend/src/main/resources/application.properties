spring.application.name=Projeto-fiado-digital

spring.datasource.url=jdbc:postgresql://localhost:5432/api-fiado
spring.datasource.username=postgres
spring.datasource.password=123456
spring.datasource.driver-class-name=org.postgresql.Driver

# Configurações extras
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.ddl-auto=update

# Dias sem pagamento para considerar dívida vencida
fiado.dias-vencimento=30

# JWT (altere o secret em produção — mínimo 32 caracteres)
jwt.secret=FiadoDigitalSecretKeyDevAlterarEmProducao2026Min32Chars
jwt.expiration-ms=86400000
